---
# Playbook 2 — Control Plane (Docker + FastAPI + PostgreSQL + Redis)
# Usage : ansible-playbook -i inventory.ini playbooks/02-setup-control-plane.yml

- name: Configure Control Plane
  hosts: control_plane
  become: true

  tasks:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create application directory
      ansible.builtin.file:
        path: /opt/securenet
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Deploy docker-compose.yml (prod — sans override dev)
      ansible.builtin.template:
        src: ../templates/docker-compose.prod.yml.j2
        dest: /opt/securenet/docker-compose.yml
        owner: root
        group: root
        mode: "0640"

    - name: Deploy .env file
      ansible.builtin.template:
        src: ../templates/env.prod.j2
        dest: /opt/securenet/.env
        owner: root
        group: root
        mode: "0600"

    - name: Pull images and start stack
      ansible.builtin.command:
        cmd: docker compose up -d --pull always
        chdir: /opt/securenet
      changed_when: true

    - name: Wait for API to be healthy
      ansible.builtin.uri:
        url: "http://10.0.0.20:8000/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 12
      delay: 5
